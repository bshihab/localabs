name: MedGemma
options:
  bundleIdPrefix: com.bilalshihab
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

packages:
  llama-binary:
    path: ../llama-binary

targets:
  MedGemma:
    type: application
    platform: iOS
    sources:
      - MedGemma
    dependencies:
      - package: llama-binary
        product: llama
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bilalshihab.MedGemma
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: false
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_NSCameraUsageDescription: "MedGemma uses the camera to scan physical lab reports and medical documents for AI analysis."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "MedGemma accesses your photo library so you can select existing photos of lab reports."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "MedGemma reads your Apple Health data to provide personalized context alongside your lab report analysis."
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "MedGemma does not write any data to Apple Health."
    # HealthKit entitlement is gated behind a paid Apple Developer Program
    # membership. Free Personal Teams can't sign a provisioning profile that
    # includes it, which blocks device builds. Once the paid membership is
    # active, restore the `properties:` block under entitlements:
    #
    #   entitlements:
    #     path: MedGemma/MedGemma.entitlements
    #     properties:
    #       com.apple.developer.healthkit: true
    #
    # Do NOT add `com.apple.developer.healthkit.access` — that's the
    # Clinical Records / Verifiable Health Records capability, a separate
    # gate requiring per-app Apple approval. We only read HKQuantityType
    # (resting HR, HRV, sleep), which the basic entitlement covers.
    #
    # In the meantime: the HealthKitService code still loads, falls back to
    # mock data when authorization fails, and the build runs everywhere.
    entitlements:
      path: MedGemma/MedGemma.entitlements
